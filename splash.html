<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OfferFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset ── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; font-family: sans-serif; }

    /* ── Splash Screen ── */
    #splash {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: #0a0e27; /* fallback */
      background-image: url('./public/images/splash-bg.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      transition: transform 700ms cubic-bezier(0.4, 0, 0.2, 1);
      will-change: transform;
    }
    #splash.hidden {
      transform: translateY(-100vh);
    }

    /* Dark overlay for text readability */
    #splash::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, rgba(0,0,0,0.20) 0%, rgba(0,0,0,0.20) 40%, rgba(0,0,0,0.55) 100%);
      z-index: 1;
      pointer-events: none;
    }

    /* ── Foreground Content ── */
    .splash-content {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    /* ── Title ── */
    .splash-title {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -60%);
      font-family: 'Permanent Marker', cursive;
      font-size: clamp(3rem, 10vw, 6rem);
      color: #FFD700;
      text-shadow:
        0 0 20px rgba(255, 215, 0, 0.3),
        0 2px 4px rgba(0, 0, 0, 0.5);
      text-align: center;
      line-height: 1.1;
      letter-spacing: 0.02em;
      opacity: 0;
      transform: translate(-50%, -60%) translateY(30px);
      transition: opacity 800ms ease-out, transform 800ms ease-out;
    }
    .splash-title.visible {
      opacity: 1;
      transform: translate(-50%, -60%) translateY(0);
    }

    /* ── Subtitle ── */
    .splash-subtitle {
      position: absolute;
      left: 50%;
      top: calc(50% + clamp(3.2rem, 11vw, 6.8rem));
      transform: translateX(-50%);
      color: #ffffff;
      font-size: clamp(0.875rem, 2vw, 1.125rem);
      font-weight: 400;
      text-align: center;
      text-shadow: 0 1px 8px rgba(0, 0, 0, 0.5);
      white-space: nowrap;
      opacity: 0;
      transform: translateX(-50%) translateY(20px);
      transition: opacity 800ms ease-out 200ms, transform 800ms ease-out 200ms;
    }
    .splash-subtitle.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Bottom Hint ── */
    .splash-hint {
      position: absolute;
      bottom: 3rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
      color: rgba(255, 255, 255, 0.7);
      font-size: 0.85rem;
      text-shadow: 0 1px 6px rgba(0, 0, 0, 0.5);
      opacity: 0;
      transform: translateX(-50%) translateY(15px);
      transition: opacity 800ms ease-out 400ms, transform 800ms ease-out 400ms, color 200ms;
      user-select: none;
      -webkit-user-select: none;
    }
    .splash-hint.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .splash-hint:hover { color: #ffffff; }

    /* ── Bounce Arrow ── */
    .arrow-down {
      width: 28px;
      height: 28px;
      animation: float-bounce 1.5s ease-in-out infinite;
    }
    @keyframes float-bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(10px); }
    }

    /* ── Arrow SVG ── */
    .arrow-down svg {
      display: block;
      width: 100%;
      height: 100%;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* ── Main App Content (placeholder) ── */
    #app-content {
      min-height: 100vh;
      background: #0a0e27;
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      transform: translateY(100vh);
      transition: transform 700ms cubic-bezier(0.4, 0, 0.2, 1) 50ms;
      will-change: transform;
    }
    #app-content.visible {
      transform: translateY(0);
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .splash-subtitle { white-space: normal; padding: 0 1.5rem; }
    }
  </style>
</head>
<body>

  <!-- ═══════════════ Splash Screen ═══════════════ -->
  <div id="splash">
    <div class="splash-content">
      <!-- Title -->
      <h1 class="splash-title" id="title">OfferFlow</h1>

      <!-- Subtitle -->
      <p class="splash-subtitle" id="subtitle">把求职从焦虑，变成可管理的流程。</p>

      <!-- Bottom Hint -->
      <div class="splash-hint" id="hint">
        <span>向下滑动以进入</span>
        <div class="arrow-down">
          <svg viewBox="0 0 24 24">
            <path d="M19 14l-7 7m0 0l-7-7m7 7V3" />
          </svg>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══════════════ Main App Content ═══════════════ -->
  <!-- Replace this section with your React / Vue / etc. app root -->
  <div id="app-content">
    <p>Main App Area</p>
  </div>

  <script>
    (function() {
      'use strict';

      // ── DOM refs ──
      var splash     = document.getElementById('splash');
      var titleEl    = document.getElementById('title');
      var subtitleEl = document.getElementById('subtitle');
      var hintEl     = document.getElementById('hint');
      var appContent = document.getElementById('app-content');

      var entered = false;

      // ── Staggered entrance animation on load ──
      requestAnimationFrame(function() {
        requestAnimationFrame(function() {
          titleEl.classList.add('visible');
          subtitleEl.classList.add('visible');
          hintEl.classList.add('visible');
        });
      });

      // ── Dismiss splash ──
      function dismissSplash() {
        if (entered) return;
        entered = true;
        splash.classList.add('hidden');
        appContent.classList.add('visible');
        // Remove splash from DOM after transition completes
        setTimeout(function() {
          splash.style.display = 'none';
        }, 800); // matches or exceeds transition duration
      }

      // ── Wheel / scroll down ──
      window.addEventListener('wheel', function(e) {
        if (e.deltaY > 10) dismissSplash();
      }, { passive: true });

      // ── Touch swipe down ──
      var touchStartY = 0;
      window.addEventListener('touchstart', function(e) {
        touchStartY = e.touches[0].clientY;
      }, { passive: true });

      window.addEventListener('touchend', function(e) {
        var diff = e.changedTouches[0].clientY - touchStartY;
        if (diff > 50) dismissSplash();
      }, { passive: true });

      // ── Click / tap the hint ──
      hintEl.addEventListener('click', dismissSplash);

    })();
  </script>
</body>
</html>
